apiVersion: v1
kind: ConfigMap
metadata:
  name: globacl-grafana-datasources
  namespace: globacl
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://globacl-prometheus.globacl.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: globacl-grafana-provisioning
  namespace: globacl
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: globacl
        orgId: 1
        folder: globacl
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-grafana
  namespace: globacl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globacl-grafana
  template:
    metadata:
      labels:
        app: globacl-grafana
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:13.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/globacl-overview.json
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_DEFAULT_THEME
              value: light
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
      volumes:
        - name: data
          emptyDir: {}
        - name: datasources
          configMap:
            name: globacl-grafana-datasources
        - name: provisioning
          configMap:
            name: globacl-grafana-provisioning
        - name: dashboards
          configMap:
            name: globacl-grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-grafana
  namespace: globacl
spec:
  selector:
    app: globacl-grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
