apiVersion: v1
kind: ServiceAccount
metadata:
  name: globacl-prometheus
  namespace: globacl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: globacl-prometheus
  namespace: globacl
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: globacl-prometheus
  namespace: globacl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: globacl-prometheus
subjects:
  - kind: ServiceAccount
    name: globacl-prometheus
    namespace: globacl
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: globacl-prometheus-config
  namespace: globacl
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: globacl-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - globacl
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: "true"
          - source_labels:
              - __meta_kubernetes_pod_container_port_name
            action: keep
            regex: metrics
          - source_labels:
              - __meta_kubernetes_pod_ip
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            separator: ":"
            target_label: __address__
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - source_labels:
              - __meta_kubernetes_pod_label_app
            target_label: component
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: globacl-prometheus-rules
  namespace: globacl
data:
  globacl.rules.yaml: |
    groups:
      - name: globacl.local
        rules:
          - alert: GlobaclCommitdNoWriteLeader
            expr: sum(globacl_commitd_write_authority) < 1
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: globacl commitd has no write leader
          - alert: GlobaclAgentStale
            expr: max(globacl_agent_stale) > 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: one or more globacl agents are stale
          - alert: GlobaclRelaySourceDown
            expr: max(1 - globacl_relay_source_up) > 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: one or more globacl relays cannot reach their source
          - alert: GlobaclPublisherErrors
            expr: increase(globacl_commitd_publish_errors_total[5m]) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: commitd publisher errors increased
          - alert: GlobaclMetricsTargetDown
            expr: up{job="globacl-pods"} == 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: a globacl metrics target is down
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-prometheus
  namespace: globacl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globacl-prometheus
  template:
    metadata:
      labels:
        app: globacl-prometheus
    spec:
      serviceAccountName: globacl-prometheus
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.listen-address=0.0.0.0:9090"
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: globacl-prometheus-config
        - name: rules
          configMap:
            name: globacl-prometheus-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-prometheus
  namespace: globacl
spec:
  selector:
    app: globacl-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
