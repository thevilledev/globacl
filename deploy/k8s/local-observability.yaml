apiVersion: v1
kind: Namespace
metadata:
  name: globacl
---
apiVersion: v1
kind: Secret
metadata:
  name: globacl-signature
  namespace: globacl
type: Opaque
stringData:
  key_id: dev-ed25519
  private_key: 9d61b19deffd5a60ba844af492ec2cc44449c5697b326919703bac031cae7f60
  public_key: d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-commitd-peer
  namespace: globacl
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: globacl-commitd
  ports:
    - name: http
      port: 7003
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: globacl-commitd
  namespace: globacl
spec:
  serviceName: globacl-commitd-peer
  replicas: 3
  selector:
    matchLabels:
      app: globacl-commitd
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: globacl-commitd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9103"
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: commitd
          image: ghcr.io/thevilledev/globacl:ci
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/globacl-commitd"]
          args: ["/data/commitd", "0.0.0.0:7003", "64", "0"]
          env:
            - name: GLOBACL_COMMITD_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLOBACL_COMMITD_CLUSTER_ID
              value: globacl-local-observability
            - name: GLOBACL_COMMITD_INITIAL_LEADER_ID
              value: globacl-commitd-0
            - name: GLOBACL_COMMITD_QUORUM
              value: "2"
            - name: GLOBACL_COMMITD_HEARTBEAT_MS
              value: "250"
            - name: GLOBACL_COMMITD_ELECTION_MS
              value: "1200"
            - name: GLOBACL_COMMITD_SYNC_MS
              value: "500"
            - name: GLOBACL_COMMITD_PEERS
              value: >-
                globacl-commitd-0=globacl-commitd-0.globacl-commitd-peer.globacl.svc.cluster.local:7003,
                globacl-commitd-1=globacl-commitd-1.globacl-commitd-peer.globacl.svc.cluster.local:7003,
                globacl-commitd-2=globacl-commitd-2.globacl-commitd-peer.globacl.svc.cluster.local:7003
            - name: GLOBACL_SIGNATURE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: key_id
            - name: GLOBACL_SIGNATURE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: private_key
            - name: GLOBACL_COMMITD_METRICS_ADDR
              value: "0.0.0.0:9103"
          ports:
            - containerPort: 7003
              name: http
            - containerPort: 9103
              name: metrics
          readinessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-commitd
  namespace: globacl
spec:
  selector:
    app: globacl-commitd
  ports:
    - name: http
      port: 7003
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-control
  namespace: globacl
spec:
  replicas: 3
