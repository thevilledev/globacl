apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-relay
  namespace: globacl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: globacl-relay
  template:
    metadata:
      labels:
        app: globacl-relay
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9101"
