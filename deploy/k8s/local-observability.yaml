              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: key_id
            - name: GLOBACL_SIGNATURE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: private_key
            - name: GLOBACL_RELAY_METRICS_ADDR
              value: "0.0.0.0:9101"
          ports:
            - containerPort: 7001
              name: http
            - containerPort: 9101
              name: metrics
          readinessProbe:
            httpGet:
              path: /health
              port: http
---
