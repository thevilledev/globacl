apiVersion: v1
kind: Namespace
metadata:
  name: globacl
---
apiVersion: v1
kind: Secret
metadata:
  name: globacl-signature
  namespace: globacl
type: Opaque
stringData:
  key_id: dev
  secret: globacl-dev-secret
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-control-peer
  namespace: globacl
spec:
  clusterIP: None
  selector:
    app: globacl-control
  ports:
    - name: http
      port: 7000
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: globacl-control
  namespace: globacl
spec:
  serviceName: globacl-control-peer
  replicas: 3
  selector:
    matchLabels:
      app: globacl-control
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: globacl-control
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: control
          image: globacl:ci
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/globacl-control"]
          args: ["/data/control", "0.0.0.0:7000", "64", "0"]
          env:
            - name: GLOBACL_CONTROL_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLOBACL_CONTROL_CLUSTER_ID
              value: globacl-global
            - name: GLOBACL_CONTROL_QUORUM
              value: "2"
            - name: GLOBACL_CONTROL_HEARTBEAT_MS
              value: "250"
            - name: GLOBACL_CONTROL_ELECTION_MS
              value: "1200"
            - name: GLOBACL_CONTROL_PEERS
              value: >-
                globacl-control-0=globacl-control-0.globacl-control-peer.globacl.svc.cluster.local:7000,
                globacl-control-1=globacl-control-1.globacl-control-peer.globacl.svc.cluster.local:7000,
                globacl-control-2=globacl-control-2.globacl-control-peer.globacl.svc.cluster.local:7000
            - name: GLOBACL_SIGNATURE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: key_id
            - name: GLOBACL_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: secret
          ports:
            - containerPort: 7000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-control
  namespace: globacl
spec:
  type: NodePort
  selector:
    app: globacl-control
  ports:
    - name: http
      port: 7000
      targetPort: http
      nodePort: 30080
