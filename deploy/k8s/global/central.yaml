apiVersion: v1
kind: Namespace
metadata:
  name: globacl
---
apiVersion: v1
kind: Secret
metadata:
  name: globacl-signature
  namespace: globacl
type: Opaque
stringData:
  key_id: dev
  secret: globacl-dev-secret
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-commitd-peer
  namespace: globacl
spec:
  clusterIP: None
  selector:
    app: globacl-commitd
  ports:
    - name: http
      port: 7003
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: globacl-commitd
  namespace: globacl
spec:
  serviceName: globacl-commitd-peer
  replicas: 3
  selector:
    matchLabels:
      app: globacl-commitd
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: globacl-commitd
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: commitd
          image: globacl:ci
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/globacl-commitd"]
          args: ["/data/commitd", "0.0.0.0:7003", "64", "0"]
          env:
            - name: GLOBACL_COMMITD_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLOBACL_COMMITD_CLUSTER_ID
              value: globacl-global
            - name: GLOBACL_COMMITD_QUORUM
              value: "2"
            - name: GLOBACL_COMMITD_HEARTBEAT_MS
              value: "250"
            - name: GLOBACL_COMMITD_ELECTION_MS
              value: "1200"
            - name: GLOBACL_COMMITD_PEERS
              value: >-
                globacl-commitd-0=globacl-commitd-0.globacl-commitd-peer.globacl.svc.cluster.local:7003,
                globacl-commitd-1=globacl-commitd-1.globacl-commitd-peer.globacl.svc.cluster.local:7003,
                globacl-commitd-2=globacl-commitd-2.globacl-commitd-peer.globacl.svc.cluster.local:7003
            - name: GLOBACL_SIGNATURE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: key_id
            - name: GLOBACL_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: secret
          ports:
            - containerPort: 7003
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-commitd
  namespace: globacl
spec:
  selector:
    app: globacl-commitd
  ports:
    - name: http
      port: 7003
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-control
  namespace: globacl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: globacl-control
  template:
    metadata:
      labels:
        app: globacl-control
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: control
          image: globacl:ci
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/globacl-control"]
          args:
            - "globacl-commitd.globacl.svc.cluster.local:7003"
            - "0.0.0.0:7000"
          ports:
            - containerPort: 7000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-control
  namespace: globacl
spec:
  type: NodePort
  selector:
    app: globacl-control
  ports:
    - name: http
      port: 7000
      targetPort: http
      nodePort: 30080
