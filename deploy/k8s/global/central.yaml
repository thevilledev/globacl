apiVersion: v1
kind: Namespace
metadata:
  name: globacl
---
apiVersion: v1
kind: Secret
metadata:
  name: globacl-signature
  namespace: globacl
type: Opaque
stringData:
  key_id: dev
  secret: globacl-dev-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: globacl-control
  namespace: globacl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globacl-control
  template:
    metadata:
      labels:
        app: globacl-control
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: control
          image: globacl:ci
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/globacl-control"]
          args: ["/data/control", "0.0.0.0:7000", "64", "0"]
          env:
            - name: GLOBACL_SIGNATURE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: key_id
            - name: GLOBACL_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: globacl-signature
                  key: secret
          ports:
            - containerPort: 7000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: globacl-control
  namespace: globacl
spec:
  type: NodePort
  selector:
    app: globacl-control
  ports:
    - name: http
      port: 7000
      targetPort: http
      nodePort: 30080
