name: yamllint
description: Run a pinned yamllint version through uv.

inputs:
  version:
    description: yamllint version to run from PyPI through uv.
    required: false
    default: "1.38.0"
  config:
    description: yamllint config file.
    required: false
    default: ".yamllint"
  paths:
    description: Newline-delimited files or directories to lint.
    required: false
    default: |
      .github/actions
      .github/workflows
      deploy/k8s/local.yaml
      deploy/k8s/nats-jetstream.yaml
      deploy/k8s/global/central.yaml
      deploy/k8s/global/region.yaml.tpl

runs:
  using: composite
  steps:
    - name: Check uv
      shell: bash
      run: |
        set -euo pipefail
        uv --version

    - name: Run yamllint
      shell: bash
      env:
        YAMLLINT_CONFIG: ${{ inputs.config }}
        YAMLLINT_PATHS: ${{ inputs.paths }}
        YAMLLINT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        mapfile -t paths <<<"${YAMLLINT_PATHS}"
        filtered=()
        for path in "${paths[@]}"; do
          [[ -n "${path}" ]] && filtered+=("${path}")
        done
        uvx --from "yamllint==${YAMLLINT_VERSION}" yamllint --version
        uvx --from "yamllint==${YAMLLINT_VERSION}" yamllint -c "${YAMLLINT_CONFIG}" "${filtered[@]}"
