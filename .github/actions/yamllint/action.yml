name: yamllint
description: Run locked yamllint through uv.

inputs:
  config:
    description: yamllint config file.
    required: false
    default: ".yamllint"
  paths:
    description: Newline-delimited files or directories to lint.
    required: false
    default: |
      .github/dependabot.yml
      .github/actions
      .github/workflows
      deploy/k8s/local.yaml
      deploy/k8s/local-observability.yaml
      deploy/k8s/nats-jetstream.yaml
      deploy/k8s/global/central.yaml
      deploy/k8s/global/region.yaml.tpl
      docs/openapi.yaml

runs:
  using: composite
  steps:
    - name: Check uv
      shell: bash
      run: |
        set -euo pipefail
        uv --version

    - name: Run yamllint
      shell: bash
      env:
        YAMLLINT_CONFIG: ${{ inputs.config }}
        YAMLLINT_PATHS: ${{ inputs.paths }}
      run: |
        set -euo pipefail
        mapfile -t paths <<<"${YAMLLINT_PATHS}"
        filtered=()
        for path in "${paths[@]}"; do
          [[ -n "${path}" ]] && filtered+=("${path}")
        done
        uv run --frozen yamllint --version
        uv run --frozen yamllint -c "${YAMLLINT_CONFIG}" "${filtered[@]}"
