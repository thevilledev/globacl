name: k3s e2e manual

on:
  workflow_dispatch:
    inputs:
      suite:
        description: E2E suite to run
        required: true
        default: local
        type: choice
        options:
          - local
          - object-storage
          - jetstream
          - global
          - observability
          - all

permissions:
  contents: read

env:
  K3D_VERSION: v5.8.3
  KUBECTL_VERSION: v1.31.5

jobs:
  local:
    if: ${{ inputs.suite == 'local' || inputs.suite == 'all' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
      - name: Run local k3s e2e
        run: ./deploy/k3s/local-e2e.sh

  jetstream:
    if: ${{ inputs.suite == 'jetstream' || inputs.suite == 'all' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
      - name: Run JetStream k3s e2e
        run: ./deploy/k3s/jetstream-e2e.sh

  object-storage:
    if: ${{ inputs.suite == 'object-storage' || inputs.suite == 'all' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
      - name: Run object-storage k3s e2e
        run: ./deploy/k3s/object-storage-e2e.sh

  global:
    if: ${{ inputs.suite == 'global' || inputs.suite == 'all' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
      - name: Run global k3s e2e
        run: ./deploy/k3s/global-e2e.sh

  observability:
    if: ${{ inputs.suite == 'observability' || inputs.suite == 'all' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Install kubectl
        run: |
          set -euo pipefail
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
      - name: Run observability k3s e2e
        run: ./deploy/k3s/observability-e2e.sh
