name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup toolchain install

      - name: Cargo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Benchmark harness
        run: cargo run -p globacl-bench --release --locked -- --ci

      - name: Build
        run: cargo build --workspace --locked

  repository:
    name: repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check shell scripts
        run: |
          set -euo pipefail
          bash -n deploy/k3s/local-e2e.sh
          bash -n deploy/k3s/jetstream-e2e.sh
          bash -n deploy/k3s/object-storage-e2e.sh
          bash -n deploy/k3s/global-e2e.sh
          bash -n deploy/k3s/observability-e2e.sh
          bash -n deploy/k3s/dev-cluster.sh
          bash -n scripts/check-k8s-images-pinned.sh

      - name: Check Kubernetes image pins
        run: scripts/check-k8s-images-pinned.sh

      - name: Check Grafana dashboards
        run: jq empty deploy/grafana/*.json

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.7"
          cache-dependency-glob: uv.lock

      - name: Lint YAML
        uses: ./.github/actions/yamllint

      - name: Validate OpenAPI
        run: |
          set -euo pipefail
          uv run --frozen openapi-spec-validator docs/openapi.yaml

      - name: Install pnpm
        run: npm install --global pnpm@11.2.2

      - name: Check generated clients
        env:
          OAPI_CODEGEN_VERSION: "v2.5.0"
        run: scripts/check-generated-clients.sh

      - name: Check TypeScript client
        working-directory: clients/typescript
        run: pnpm run check

      - name: Build TypeScript client
        working-directory: clients/typescript
        run: pnpm run build

      - name: Test Go clients
        working-directory: clients/go
        run: go test ./...

      - name: Audit GitHub Actions
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          advanced-security: false
          annotations: true

      - name: Check diffs
        run: git diff --check

  docker:
    name: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t ghcr.io/thevilledev/globacl:ci .
