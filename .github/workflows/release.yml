name: release (nightly)

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/thevilledev/globacl

jobs:
  binaries:
    name: binaries (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: globacl-linux-amd64
            runner: ubuntu-24.04
          - artifact: globacl-linux-arm64
            runner: ubuntu-24.04-arm
          - artifact: globacl-macos-amd64
            runner: macos-15-intel
          - artifact: globacl-macos-arm64
            runner: macos-15
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup toolchain install

      - name: Cargo cache
        # actions/cache v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ matrix.artifact }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.artifact }}-

      - name: Build release binaries
        run: |
          set -euo pipefail
          cargo build --release --locked \
            -p globacl-agent \
            -p globacl-bench \
            -p globacl-commitd \
            -p globacl-control \
            -p globacl-demo-app \
            -p globacl-relay

      - name: Package binaries
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          bins=(
            globacl-agent
            globacl-bench
            globacl-commitd
            globacl-control
            globacl-demo-app
            globacl-relay
          )
          mkdir -p "dist/${ARTIFACT}"
          for bin in "${bins[@]}"; do
            install -m 0755 "target/release/${bin}" "dist/${ARTIFACT}/${bin}"
          done
          tar -C dist -czf "dist/${ARTIFACT}.tar.gz" "${ARTIFACT}"

      - name: Upload binaries
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  image:
    name: image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up QEMU
        # docker/setup-qemu-action v4.0.0
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        # docker/login-action v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        # docker/metadata-action v6.1.0
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=schedule,pattern=nightly
            type=schedule,pattern=nightly-{{date 'YYYYMMDD'}}
            type=sha,prefix=sha-

      - name: Build and push image
        id: build
        # docker/build-push-action v7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Attest image provenance
        # actions/attest-build-provenance v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
