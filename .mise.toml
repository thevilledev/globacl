[tools]
go = "1.26.1"
node = "25.9.0"
pnpm = "11.2.2"
uv = "0.11.7"

[env]
OAPI_CODEGEN_VERSION = "v2.5.0"
OPENAPI_SPEC_VALIDATOR_VERSION = "0.7.2"
YAMLLINT_VERSION = "1.38.0"
ZIZMOR_VERSION = "1.25.2"

[tasks.yamllint]
description = "Lint tracked YAML files"
run = "git ls-files -z -- '*.yaml' '*.yml' '*.yaml.tpl' | xargs -0 uvx --from yamllint==$YAMLLINT_VERSION yamllint -c .yamllint"

[tasks.openapi]
description = "Validate the OpenAPI contract"
run = "uvx --from openapi-spec-validator==$OPENAPI_SPEC_VALIDATOR_VERSION openapi-spec-validator docs/openapi.yaml"

[tasks.zizmor]
description = "Audit GitHub Actions workflows"
run = "uvx --from zizmor==$ZIZMOR_VERSION zizmor .github/workflows"

[tasks.generate-clients]
description = "Regenerate checked-in Go and TypeScript clients from OpenAPI"
run = "scripts/generate-clients.sh"

[tasks.check-generated-clients]
description = "Verify checked-in generated clients match docs/openapi.yaml"
run = "scripts/check-generated-clients.sh"
