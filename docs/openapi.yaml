openapi: 3.1.0
info:
  title: globacl HTTP API
  version: 0.1.0
  summary: Control-plane, repair, and local lookup API for globacl.
  description: |
    globacl currently uses JSON request and response bodies for most APIs.
    Authoring clients should talk to `globacl-control`. Runtime applications should talk to the local
    `globacl-agent` lookup API. Relays and agents use the mutation, snapshot, and acknowledgement
    endpoints for propagation and repair.

    The canonical client path is:

    - admin or abuse systems -> `globacl-control`
    - applications -> local `globacl-agent`
    - relays and agents -> relay/control repair APIs

    Direct use of `globacl-commitd` internals is not a public client contract.

servers:
  - url: http://127.0.0.1:7000
    description: Local `globacl-control` gateway.
  - url: http://127.0.0.1:7001
    description: Local relay API for agents.
  - url: http://127.0.0.1:7002
    description: Local agent lookup API for applications.

tags:
  - name: Operations
    description: Health and operational status endpoints.
  - name: Authoring
    description: Public ACL mutation authoring through `globacl-control`.
  - name: Lookup
    description: Local request-time ACL decisions.
  - name: Propagation
    description: Mutation streams, watermarks, acknowledgements, and propagation status.
  - name: Snapshots
    description: Snapshot bootstrap, repair, manifests, and rollback.

paths:
  /health:
    get:
      tags:
        - Operations
      summary: Return component health.
      description: |
        Supported by control, commitd, relay, agent, and demo app components. Fields vary by component.
      operationId: getHealth
      responses:
        "200":
          description: Component health as JSON object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                control:
                  value:
                    status: ok
                    role: control
                    commitd: ok
                    commit_addr: 127.0.0.1:7003

  /v1/deny:
    post:
      tags:
        - Authoring
      summary: Commit a point deny, allow override, or delete mutation.
      operationId: createDenyMutation
      security:
        - BearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/DenyMutation"
      responses:
        "200":
          $ref: "#/components/responses/CommitOutcome"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"
        "400":
          $ref: "#/components/responses/RejectedJson"
        "503":
          $ref: "#/components/responses/UnavailableJson"

  /v1/mutation:
    post:
      tags:
        - Authoring
      summary: Alias for `/v1/deny`.
      operationId: createPointMutation
      security:
        - BearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/DenyMutation"
      responses:
        "200":
          $ref: "#/components/responses/CommitOutcome"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"
        "400":
          $ref: "#/components/responses/RejectedJson"
        "503":
          $ref: "#/components/responses/UnavailableJson"

  /v1/rule:
    post:
      tags:
        - Authoring
      summary: Commit a compiled rule mutation.
      description: Supports IPv4 CIDR and domain suffix rules.
      operationId: createRuleMutation
      security:
        - BearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/RuleMutation"
      responses:
        "200":
          $ref: "#/components/responses/CommitOutcome"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"
        "400":
          $ref: "#/components/responses/RejectedJson"
        "503":
          $ref: "#/components/responses/UnavailableJson"

  /v1/canary:
    post:
      tags:
        - Propagation
      summary: Commit a synthetic P0 canary deny.
      operationId: createCanary
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Canary status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanaryStatusResponse"
              examples:
                committed:
                  value:
                    status: ok
                    op_id: canary-1760000000
                    tenant_id: globacl
                    namespace: canary
                    key: sentinel-1760000000
                    shard_id: 7
                    seq: 42
                    delivery_priority: p0
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"
        "503":
          $ref: "#/components/responses/UnavailableJson"

  /v1/canary/latest:
    get:
      tags:
        - Propagation
      summary: Return the latest committed canary.
      operationId: getLatestCanary
      responses:
        "200":
          description: Latest canary or `status=none`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestCanaryResponse"

  /v1/lookup:
    get:
      tags:
        - Lookup
      summary: Check an exact point-key deny decision.
      operationId: lookupPointDecision
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Key"
      responses:
        "200":
          $ref: "#/components/responses/DecisionJson"

  /v1/check:
    get:
      tags:
        - Lookup
      summary: Check point denies and compiled rules.
      operationId: checkAclDecision
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Namespace"
        - $ref: "#/components/parameters/Value"
      responses:
        "200":
          $ref: "#/components/responses/DecisionJson"

  /v1/watermarks:
    get:
      tags:
        - Propagation
      summary: Return latest source sequence per shard.
      operationId: getWatermarks
      responses:
        "200":
          $ref: "#/components/responses/WatermarksJson"

  /v1/compaction_watermarks:
    get:
      tags:
        - Propagation
      summary: Return the compacted mutation-log floor per shard.
      operationId: getCompactionWatermarks
      responses:
        "200":
          $ref: "#/components/responses/WatermarksJson"

  /v1/mutations:
    get:
      tags:
        - Propagation
      summary: Return committed mutations for one shard after `from_seq`.
      operationId: getMutations
      parameters:
        - $ref: "#/components/parameters/Shard"
        - $ref: "#/components/parameters/FromSeq"
        - $ref: "#/components/parameters/DeliveryPriority"
      responses:
        "200":
          $ref: "#/components/responses/MutationStream"
        "409":
          $ref: "#/components/responses/HistoryCompacted"

  /v1/mutations.sig:
    get:
      tags:
        - Propagation
      summary: Return an Ed25519 signature envelope for `/v1/mutations`.
      operationId: getMutationsSignature
      parameters:
        - $ref: "#/components/parameters/Shard"
        - $ref: "#/components/parameters/FromSeq"
        - $ref: "#/components/parameters/DeliveryPriority"
      responses:
        "200":
          $ref: "#/components/responses/SignatureEnvelope"
        "409":
          $ref: "#/components/responses/HistoryCompacted"

  /v1/delta_bundle:
    get:
      tags:
        - Propagation
      summary: Return a bounded mutation range for gap repair.
      operationId: getDeltaBundle
      parameters:
        - $ref: "#/components/parameters/Shard"
        - $ref: "#/components/parameters/FromSeq"
        - $ref: "#/components/parameters/ToSeq"
      responses:
        "200":
          $ref: "#/components/responses/MutationStream"
        "409":
          $ref: "#/components/responses/HistoryCompacted"

  /v1/delta_bundle.sig:
    get:
      tags:
        - Propagation
      summary: Return an Ed25519 signature envelope for `/v1/delta_bundle`.
      operationId: getDeltaBundleSignature
      parameters:
        - $ref: "#/components/parameters/Shard"
        - $ref: "#/components/parameters/FromSeq"
        - $ref: "#/components/parameters/ToSeq"
      responses:
        "200":
          $ref: "#/components/responses/SignatureEnvelope"
        "409":
          $ref: "#/components/responses/HistoryCompacted"

  /v1/ack:
    post:
      tags:
        - Propagation
      summary: Record an agent or relay propagation acknowledgement.
      operationId: recordAck
      requestBody:
        $ref: "#/components/requestBodies/Ack"
      responses:
        "200":
          description: Ack accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  value:
                    status: ok
        "503":
          $ref: "#/components/responses/UnavailableJson"

  /v1/acks:
    get:
      tags:
        - Propagation
      summary: Return relay-local acknowledgement state.
      operationId: getRelayAcks
      responses:
        "200":
          description: Relay ack table as JSON object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayAcksResponse"

  /v1/propagation/status:
    get:
      tags:
        - Propagation
      summary: Return central propagation acknowledgement coverage.
      operationId: getPropagationStatus
      responses:
        "200":
          description: Aggregate propagation status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropagationStatusResponse"

  /v1/snapshot:
    get:
      tags:
        - Snapshots
      summary: Return the latest binary snapshot.
      operationId: getSnapshot
      responses:
        "200":
          $ref: "#/components/responses/SnapshotBinary"
    post:
      tags:
        - Snapshots
      summary: Upload and archive a binary snapshot.
      operationId: uploadSnapshot
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Snapshot accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"

  /v1/snapshot.sig:
    get:
      tags:
        - Snapshots
      summary: Return an Ed25519 signature envelope for `/v1/snapshot`.
      operationId: getSnapshotSignature
      responses:
        "200":
          $ref: "#/components/responses/SignatureEnvelope"

  /v1/snapshot_manifest:
    get:
      tags:
        - Snapshots
      summary: Return the latest snapshot manifest.
      operationId: getSnapshotManifest
      responses:
        "200":
          description: Snapshot manifest as JSON object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotManifestResponse"

  /v1/snapshot_manifest.sig:
    get:
      tags:
        - Snapshots
      summary: Return an Ed25519 signature envelope for `/v1/snapshot_manifest`.
      operationId: getSnapshotManifestSignature
      responses:
        "200":
          $ref: "#/components/responses/SignatureEnvelope"

  /v1/snapshot_artifact:
    get:
      tags:
        - Snapshots
      summary: Return an immutable snapshot artifact by object name.
      operationId: getSnapshotArtifact
      parameters:
        - $ref: "#/components/parameters/SnapshotObject"
      responses:
        "200":
          $ref: "#/components/responses/SnapshotBinary"
        "400":
          $ref: "#/components/responses/RejectedJson"

  /v1/snapshot_artifact.sig:
    get:
      tags:
        - Snapshots
      summary: Return an Ed25519 signature envelope for `/v1/snapshot_artifact`.
      operationId: getSnapshotArtifactSignature
      parameters:
        - $ref: "#/components/parameters/SnapshotObject"
      responses:
        "200":
          $ref: "#/components/responses/SignatureEnvelope"
        "400":
          $ref: "#/components/responses/RejectedJson"

  /v1/snapshots:
    get:
      tags:
        - Snapshots
      summary: List archived rollback snapshot targets.
      operationId: listSnapshots
      responses:
        "200":
          description: Snapshot names as JSON object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotListResponse"

  /v1/rollback:
    post:
      tags:
        - Snapshots
      summary: Restore an archived snapshot through forward compensating mutations.
      operationId: rollbackToSnapshot
      security:
        - BearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/Rollback"
      responses:
        "200":
          description: Rollback accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"
        "400":
          $ref: "#/components/responses/RejectedJson"

  /v1/audit:
    get:
      tags:
        - Operations
      summary: Return the append-only audit log.
      operationId: getAuditLog
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Audit log JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedJson"
        "403":
          $ref: "#/components/responses/ForbiddenJson"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Optional static bearer-token authentication. When `GLOBACL_AUTH_TOKENS`
        is unset, protected endpoints allow local development traffic.
  schemas:
    BinaryPayload:
      type: string
      format: binary
    Sequence:
      type: integer
      format: int64
      minimum: 0
      description: Monotonic per-shard sequence number.
    ShardId:
      type: integer
      format: int32
      minimum: 0
      maximum: 65535
    UnixTimestamp:
      type: integer
      format: int64
      minimum: 0
      description: Unix timestamp in seconds.
    Action:
      type: string
      enum:
        - deny
        - allow_override
        - delete
    DeliveryPriorityValue:
      type: string
      enum:
        - p0
        - p1
        - p2
    RuleKind:
      type: string
      enum:
        - ipv4_cidr
        - domain_suffix
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - stale
        role:
          type: string
          enum:
            - control
            - relay
            - agent
            - follower
            - candidate
            - leader
      additionalProperties:
        oneOf:
          - type: string
          - type: integer
          - type: boolean
    DenyMutationRequest:
      type: object
      required:
        - op_id
        - tenant_id
        - namespace
        - key
        - action
      properties:
        op_id:
          type: string
          minLength: 1
        tenant_id:
          type: string
          minLength: 1
        namespace:
          type: string
          minLength: 1
        key:
          type: string
          minLength: 1
        action:
          $ref: "#/components/schemas/Action"
        priority:
          type: integer
          format: int32
          minimum: 0
          default: 0
        reason_code:
          type: string
          default: unspecified
        expires_at:
          $ref: "#/components/schemas/UnixTimestamp"
        created_by:
          type: string
          default: unknown
        delivery_priority:
          $ref: "#/components/schemas/DeliveryPriorityValue"
        override_blast_radius:
          type: boolean
          default: false
        blast_radius_override:
          type: boolean
          default: false
        two_person_approved:
          type: boolean
          default: false
      additionalProperties: false
    RuleMutationRequest:
      type: object
      required:
        - op_id
        - tenant_id
        - kind
        - pattern
        - action
      properties:
        op_id:
          type: string
          minLength: 1
        tenant_id:
          type: string
          minLength: 1
        kind:
          $ref: "#/components/schemas/RuleKind"
        pattern:
          type: string
          minLength: 1
        action:
          $ref: "#/components/schemas/Action"
        priority:
          type: integer
          format: int32
          minimum: 0
          default: 0
        reason_code:
          type: string
          default: unspecified
        expires_at:
          $ref: "#/components/schemas/UnixTimestamp"
        created_by:
          type: string
          default: unknown
        delivery_priority:
          $ref: "#/components/schemas/DeliveryPriorityValue"
        override_blast_radius:
          type: boolean
          default: false
        blast_radius_override:
          type: boolean
          default: false
        two_person_approved:
          type: boolean
          default: false
      additionalProperties: false
    CommitOutcomeResponse:
      type: object
      required:
        - duplicate
        - shard_id
        - seq
        - epoch
        - action
        - key_hash
        - delivery_priority
        - committed_at_unix
        - entries_changed
      properties:
        duplicate:
          type: boolean
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        epoch:
          $ref: "#/components/schemas/Sequence"
        action:
          $ref: "#/components/schemas/Action"
        key_hash:
          type: integer
          format: uint64
          minimum: 0
        delivery_priority:
          $ref: "#/components/schemas/DeliveryPriorityValue"
        committed_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        entries_changed:
          type: integer
          format: int32
          minimum: 0
        rule_kind:
          $ref: "#/components/schemas/RuleKind"
        pattern:
          type: string
        rule_hash:
          type: integer
          format: uint64
          minimum: 0
      additionalProperties: false
    AllowDecision:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - allow
      additionalProperties: false
    DenyDecision:
      type: object
      required:
        - decision
        - reason_code
        - priority
        - shard_id
        - seq
        - epoch
      properties:
        decision:
          type: string
          enum:
            - deny
        reason_code:
          type: string
        priority:
          type: integer
          format: int32
          minimum: 0
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        epoch:
          $ref: "#/components/schemas/Sequence"
      additionalProperties: false
    DecisionResponse:
      oneOf:
        - $ref: "#/components/schemas/AllowDecision"
        - $ref: "#/components/schemas/DenyDecision"
    WatermarksResponse:
      type: object
      required:
        - shard_count
      properties:
        shard_count:
          type: integer
          format: int32
          minimum: 1
      patternProperties:
        "^shard_[0-9]{4}$":
          $ref: "#/components/schemas/Sequence"
      additionalProperties: false
    CanaryStatusResponse:
      type: object
      required:
        - status
        - op_id
        - tenant_id
        - namespace
        - key
        - shard_id
        - seq
        - created_at_unix
        - expires_at
        - delivery_priority
      properties:
        status:
          type: string
          enum:
            - ok
        op_id:
          type: string
        tenant_id:
          type: string
        namespace:
          type: string
        key:
          type: string
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        created_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        expires_at:
          $ref: "#/components/schemas/UnixTimestamp"
        delivery_priority:
          $ref: "#/components/schemas/DeliveryPriorityValue"
      additionalProperties: false
    NoCanaryStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - none
      additionalProperties: false
    LatestCanaryResponse:
      oneOf:
        - $ref: "#/components/schemas/CanaryStatusResponse"
        - $ref: "#/components/schemas/NoCanaryStatus"
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
      additionalProperties: false
    SignatureEnvelope:
      type: object
      required:
        - algorithm
        - key_id
        - key_version
        - signature
      properties:
        algorithm:
          type: string
          enum:
            - ed25519
        key_id:
          type: string
        key_version:
          $ref: "#/components/schemas/Sequence"
        signature:
          type: string
          pattern: "^[0-9a-fA-F]+$"
      additionalProperties: false
    HistoryCompactedResponse:
      type: object
      required:
        - status
        - reason
        - compacted_seq
      properties:
        status:
          type: string
          enum:
            - compacted
        reason:
          type: string
          enum:
            - history_compacted
        compacted_seq:
          $ref: "#/components/schemas/Sequence"
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - status
        - reason
      properties:
        status:
          type: string
        reason:
          type: string
      additionalProperties: false
    PopAckRequest:
      type: object
      required:
        - agent_id
        - shard_id
        - seq
      properties:
        agent_id:
          type: string
          minLength: 1
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        entries:
          type: integer
          format: int64
          minimum: 0
          default: 0
        applied_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
      additionalProperties: false
    PropagationAckRequest:
      type: object
      required:
        - relay_id
        - location
        - agent_id
        - shard_id
        - seq
      properties:
        relay_id:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        agent_id:
          type: string
          minLength: 1
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        entries:
          type: integer
          format: int64
          minimum: 0
          default: 0
        applied_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        relay_received_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
      additionalProperties: false
    AckRequest:
      oneOf:
        - $ref: "#/components/schemas/PopAckRequest"
        - $ref: "#/components/schemas/PropagationAckRequest"
    PropagationAckStatus:
      type: object
      required:
        - relay_id
        - location
        - agent_id
        - shard_id
        - seq
        - entries
        - applied_at_unix
        - relay_received_at_unix
      properties:
        relay_id:
          type: string
        location:
          type: string
        agent_id:
          type: string
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        source_seq:
          $ref: "#/components/schemas/Sequence"
        seq_lag:
          $ref: "#/components/schemas/Sequence"
        entries:
          type: integer
          format: int64
          minimum: 0
        applied_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        relay_received_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        lag_secs:
          type: integer
          format: int64
          minimum: 0
        ack_age_secs:
          type: integer
          format: int64
          minimum: 0
      additionalProperties: false
    RelayAcksResponse:
      type: object
      required:
        - relay_id
        - location
        - ack_count
      properties:
        relay_id:
          type: string
        location:
          type: string
        ack_count:
          type: integer
          format: int64
          minimum: 0
        acks:
          type: array
          items:
            $ref: "#/components/schemas/PropagationAckStatus"
      additionalProperties: false
    PropagationStatusResponse:
      type: object
      required:
        - status
        - shard_count
        - source_max_seq
        - ack_count
        - relay_count
        - agent_count
        - acked_shards
        - min_ack_seq
        - max_ack_seq
        - max_seq_lag
        - lagging_ack_count
        - max_ack_age_secs
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        shard_count:
          type: integer
          format: int32
          minimum: 1
        source_max_seq:
          $ref: "#/components/schemas/Sequence"
        ack_count:
          type: integer
          format: int64
          minimum: 0
        relay_count:
          type: integer
          format: int64
          minimum: 0
        agent_count:
          type: integer
          format: int64
          minimum: 0
        acked_shards:
          type: integer
          format: int64
          minimum: 0
        min_ack_seq:
          $ref: "#/components/schemas/Sequence"
        max_ack_seq:
          $ref: "#/components/schemas/Sequence"
        max_seq_lag:
          $ref: "#/components/schemas/Sequence"
        lagging_ack_count:
          type: integer
          format: int64
          minimum: 0
        max_ack_age_secs:
          type: integer
          format: int64
          minimum: 0
        acks:
          type: array
          items:
            $ref: "#/components/schemas/PropagationAckStatus"
      additionalProperties: false
    SnapshotManifestResponse:
      type: object
      required:
        - manifest_version
        - format_version
        - created_at_unix
        - artifact_object
        - artifact_signature_object
        - artifact_bytes
        - artifact_sha256
        - shard_count
        - entry_count
        - rule_count
        - max_seq
      properties:
        manifest_version:
          type: integer
          format: int32
          minimum: 1
        format_version:
          type: integer
          format: int32
          minimum: 1
        created_at_unix:
          $ref: "#/components/schemas/UnixTimestamp"
        artifact_object:
          type: string
        artifact_signature_object:
          type: string
        artifact_bytes:
          type: integer
          format: int64
          minimum: 0
        artifact_sha256:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        shard_count:
          type: integer
          format: int32
          minimum: 1
        entry_count:
          type: integer
          format: int64
          minimum: 0
        rule_count:
          type: integer
          format: int64
          minimum: 0
        max_seq:
          $ref: "#/components/schemas/Sequence"
      patternProperties:
        "^shard_[0-9]{4}$":
          $ref: "#/components/schemas/Sequence"
      additionalProperties: false
    SnapshotNameOrList:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
    SnapshotListResponse:
      type: object
      required:
        - snapshot_count
        - manifest_count
      properties:
        snapshot_count:
          type: integer
          format: int64
          minimum: 0
        snapshot:
          $ref: "#/components/schemas/SnapshotNameOrList"
        manifest_count:
          type: integer
          format: int64
          minimum: 0
        manifest:
          $ref: "#/components/schemas/SnapshotNameOrList"
      additionalProperties: false
    RollbackRequest:
      type: object
      required:
        - snapshot
      properties:
        snapshot:
          type: string
          minLength: 1
      additionalProperties: false
    RollbackResponse:
      type: object
      required:
        - status
        - snapshot
        - mutations
      properties:
        status:
          type: string
          enum:
            - ok
        snapshot:
          type: string
        mutations:
          type: integer
          format: int64
          minimum: 0
      additionalProperties: false
    AuditLogEntry:
      type: object
      required:
        - ts
        - event
        - result
      properties:
        ts:
          $ref: "#/components/schemas/UnixTimestamp"
        event:
          type: string
        result:
          type: string
        op_id:
          type: string
        reason:
          type: string
        namespace:
          type: string
        key:
          type: string
        kind:
          type: string
        pattern:
          type: string
        shard_id:
          $ref: "#/components/schemas/ShardId"
        seq:
          $ref: "#/components/schemas/Sequence"
        duplicate:
          type: boolean
        snapshot:
          type: string
        mutations:
          type: integer
          format: int64
          minimum: 0
      additionalProperties:
        oneOf:
          - type: string
          - type: integer
          - type: boolean
    AuditLogResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
      additionalProperties: false

  parameters:
    TenantId:
      name: tenant_id
      in: query
      required: true
      schema:
        type: string
      example: tenant-a
    Namespace:
      name: namespace
      in: query
      required: true
      schema:
        type: string
      example: user
    Key:
      name: key
      in: query
      required: true
      schema:
        type: string
      example: user-123
    Value:
      name: value
      in: query
      required: true
      schema:
        type: string
      example: 10.1.2.3
    Shard:
      name: shard
      in: query
      required: true
      schema:
        type: integer
        format: int32
        minimum: 0
      example: 7
    FromSeq:
      name: from_seq
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
        default: 0
      example: 41
    ToSeq:
      name: to_seq
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
      example: 42
    DeliveryPriority:
      name: delivery_priority
      in: query
      required: false
      schema:
        type: string
        enum:
          - p0
          - p1
          - p2
      example: p0
    SnapshotObject:
      name: object
      in: query
      required: true
      schema:
        type: string
      example: snapshots/max_seq_00000000000000000042_sha256_0123456789abcdef.gacl

  requestBodies:
    DenyMutation:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DenyMutationRequest"
          examples:
            deny:
              value:
                op_id: demo-1
                tenant_id: tenant-a
                namespace: user
                key: user-123
                action: deny
                delivery_priority: p0
                priority: 100
                reason_code: abuse
                created_by: demo
            delete:
              value:
                op_id: demo-delete-1
                tenant_id: tenant-a
                namespace: user
                key: user-123
                action: delete
                created_by: demo
    RuleMutation:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RuleMutationRequest"
          examples:
            ipv4:
              value:
                op_id: net-1
                tenant_id: tenant-a
                kind: ipv4_cidr
                pattern: 10.0.0.0/8
                action: deny
                reason_code: blocked_network
            domain:
              value:
                op_id: domain-1
                tenant_id: tenant-a
                kind: domain_suffix
                pattern: "*.example.com"
                action: deny
                reason_code: blocked_domain
    Ack:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AckRequest"
          examples:
            agent:
              value:
                agent_id: agent-local
                shard_id: 7
                seq: 42
                entries: 100
                applied_at_unix: 1760000000
    Rollback:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RollbackRequest"
          examples:
            snapshot:
              value:
                snapshot: epoch_00000000001760000000_shard_0007_seq_00000000000000000042.gacl

  responses:
    CommitOutcome:
      description: Committed mutation outcome.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CommitOutcomeResponse"
          examples:
            committed:
              value:
                duplicate: false
                shard_id: 7
                seq: 42
                epoch: 3
                action: deny
                key_hash: 123456789
                delivery_priority: p0
                committed_at_unix: 1760000000
                entries_changed: 1
    DecisionJson:
      description: ACL decision.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DecisionResponse"
          examples:
            allow:
              value:
                decision: allow
            deny:
              value:
                decision: deny
                reason_code: abuse
                priority: 100
                shard_id: 7
                seq: 42
                epoch: 3
    WatermarksJson:
      description: Per-shard watermark text.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WatermarksResponse"
          examples:
            watermarks:
              value:
                shard_count: 4
                shard_0000: 0
                shard_0001: 42
                shard_0002: 0
                shard_0003: 7
    MutationStream:
      description: Binary mutation stream.
      content:
        application/octet-stream:
          schema:
            $ref: "#/components/schemas/BinaryPayload"
    SnapshotBinary:
      description: Binary snapshot payload.
      content:
        application/octet-stream:
          schema:
            $ref: "#/components/schemas/BinaryPayload"
    SignatureEnvelope:
      description: Ed25519 signature envelope over the corresponding payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SignatureEnvelope"
          examples:
            signature:
              value:
                algorithm: ed25519
                key_id: dev-ed25519
                key_version: 1
                signature: abcdef
    HistoryCompacted:
      description: Requested mutation history has been compacted; repair from snapshot.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HistoryCompactedResponse"
          examples:
            compacted:
              value:
                status: compacted
                reason: history_compacted
                compacted_seq: 42
    RejectedJson:
      description: Request rejected by validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rejected:
              value:
                status: rejected
                reason: blast_radius_override_required
    UnauthorizedJson:
      description: Bearer authentication is required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_bearer:
              value:
                status: rejected
                reason: missing_bearer_token
                required_scope: acl:write
    ForbiddenJson:
      description: Authenticated caller lacks the required scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            insufficient_scope:
              value:
                status: rejected
                reason: insufficient_scope
                required_scope: acl:write
    UnavailableJson:
      description: Upstream commit service is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unavailable:
              value:
                status: unavailable
                reason: commitd_proxy_failed
